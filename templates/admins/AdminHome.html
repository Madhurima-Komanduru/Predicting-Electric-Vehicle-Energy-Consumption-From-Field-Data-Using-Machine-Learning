    <style>
        /* CSS for blurred background and clear text */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

     body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('{{ MEDIA_URL }}electric-car.jpg');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    filter: blur(0px);
    z-index: -1;
}

        .content {
            position: relative;
            z-index: 1; /* Ensure content appears above the blurred background */
            padding: 20px;
            background: rgba(255, 255, 255, 0.8); /* Semi-transparent background */
            border-radius: 8px; /* Rounded corners */
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); /* Subtle shadow for readability */
            margin: 20px auto;
            max-width: 800px;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        p {
            color: #555;
        }
    </style>
</head>
