{%extends 'admins/adminbase.html'%}
{% load static %} 
{% block contents %}

<!DOCTYPE html>
<html>
<head>
    <title>Model Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
       
        .graph-container{
            margin-left: 320px;
        }
       .results-container table {
        border-collapse: collapse; /* ensures borders merge nicely */
    }
    .results-container th, 
    .results-container td {
        border: 1px solid #dee2e6; /* light gray border */
        padding: 10px;
        text-align: center;
        vertical-align: middle;
    }
    .results-container th {
        background-color: #343a40;
        color: #fff;
        font-weight: 600;
    }
    .results-container tr:hover {
        background-color: #f8f9fa;
        transition: background-color 0.2s ease-in-out;
    }
    </style>
</head>
<body>

    <div class="results-container">
    <h2>Model Comparison Results</h2>
    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover align-middle shadow-sm">
            {{ results|safe }}
        </table>
    </div>
</div>

   
    <div class="graph-container">
    <h2>Regression Comparison</h2>
    <img src="{{ graph_url }}" alt="Model Comparison Graph" class="img-fluid">
</div>

<div class="graph-container mt-4">
    <h2>Classification Confusion Matrix</h2>
    <img src="{{ confusion_url }}" alt="Confusion Matrix" class="img-fluid">
    <pre>{{ clf_report }}</pre>
</div>

</body>
</html>
{% endblock %}
